name: Validate

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or ref to validate (e.g. add-cmakefmt-0.2.0)"
        required: true
        default: "add-cmakefmt-0.2.0"

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      - name: Validate manifest
        shell: pwsh
        run: |
          $output = winget validate --manifest manifests/c/cmakefmt/cmakefmt/0.2.0/ 2>&1
          $output | ForEach-Object { Write-Output $_ }
          if ($output -match "Manifest validation failed") { exit 1 }
          Write-Output "Validation passed (warnings are non-fatal)."
